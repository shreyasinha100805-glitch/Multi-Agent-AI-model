<!DOCTYPE html>
<html>
<head>
    <title>AI Life Copilot</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-box {
            width: 400px;
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
        }

        .messages {
            height: 300px;
            overflow-y: auto;
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .user {
            color: #38bdf8;
        }

        .ai {
            color: #4ade80;
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="chat-box">
    <h2>🤖 AI Life Copilot</h2>

    <div class="messages" id="messages"></div>

    <input id="msg" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    const input = document.getElementById("msg");
    const messages = document.getElementById("messages");

    const message = input.value;
    if (!message) return;

    messages.innerHTML += `<p class="user">You: ${message}</p>`;
    input.value = "";

    try {
        const res = await fetch("https://YOUR-BACKEND-URL/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        messages.innerHTML += `<p class="ai">AI: ${data.reply}</p>`;
        messages.scrollTop = messages.scrollHeight;

    } catch (err) {
        messages.innerHTML += `<p style="color:red;">Error connecting to server</p>`;
    }
}
</script>

</body>
</html>
