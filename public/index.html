<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Life Copilot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            width: 420px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .chat {
            height: 320px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .msg {
            margin: 8px 0;
            padding: 8px 10px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user {
            background: #00c6ff;
            color: black;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #00ff9f;
            color: black;
            margin-right: auto;
            text-align: left;
        }

        .input-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #ff6b6b, #f06595);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        .typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🤖 AI Life Copilot</h2>

        <div class="chat" id="chat"></div>

        <div class="input-box">
            <input id="input" placeholder="Type message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("input");
            const chat = document.getElementById("chat");

            const message = input.value.trim();
            if (!message) return;

            addMessage("🧑 " + message, "user");
            input.value = "";

            // Show typing effect
            const typingDiv = document.createElement("div");
            typingDiv.className = "msg bot typing";
            typingDiv.innerText = "🤖 Typing...";
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("https://YOUR-BACKEND-URL/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();

                typingDiv.remove(); // remove typing

                addMessage("🤖 " + data.reply, "bot");

            } catch (err) {
                typingDiv.remove();
                addMessage("❌ Server error", "bot");
            }
        }

        function addMessage(text, type) {
            const chat = document.getElementById("chat");

            const div = document.createElement("div");
            div.className = "msg " + type;
            div.innerText = text;

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>

</body>

</html>
