<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Life Copilot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 420px;
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            color: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .chat {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #334155;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #020617;
        }

        .msg {
            margin: 6px 0;
            padding: 6px;
        }

        .user {
            color: #38bdf8;
        }

        .bot {
            color: #22c55e;
        }

        .input-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🤖 AI Life Copilot</h2>

        <div class="chat" id="chat"></div>

        <div class="input-box">
            <input id="input" placeholder="Type message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("input");
            const chat = document.getElementById("chat");

            const message = input.value.trim();
            if (!message) return;

            // Show user message
            addMessage("You: " + message, "user");

            input.value = "";

            try {
                const res = await fetch("http://localhost:5000/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();

                // Show AI response
                addMessage("AI: " + data.reply, "bot");

            } catch (err) {
                addMessage("❌ Error connecting to server", "bot");
            }
        }

        function addMessage(text, type) {
            const chat = document.getElementById("chat");

            const div = document.createElement("div");
            div.className = "msg " + type;
            div.innerText = text;

            chat.appendChild(div);

            chat.scrollTop = chat.scrollHeight;
        }
    </script>

</body>

</html>
